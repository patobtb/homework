      // function changeColor(event) {}


        let clorBox = document.querySelector('.colors-box');
        let selectedColor = document.querySelector('.selected_color');

        clorBox.addEventListener('click', changeColor);

        function changeColor(event){
          let clicked = event.target;
          let color = window.getComputedStyle(clicked).backgroundColor;
          selectedColor.style.backgroundColor = color;
          console.log('changeColor to ', color)
        }


    </script>
